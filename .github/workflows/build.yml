name: build

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "catalog.toml"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "images/**"
      - "catalog.toml"
      - ".github/workflows/build.yml"
  schedule:
    # Weekly rebuild so upstream apt/npm/pip patches flow through.
    - cron: "0 5 * * 1"
  workflow_dispatch:

# Workflow-level permissions are inherited, but several action runtimes
# treat per-job permissions differently for OIDC token scoping.
# Declared on each job for safety.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Images publish flat under the org (ghcr.io/wellmade-studio/dc-*),
  # not nested under a devcontainers/ path. The `dc-` prefix
  # self-identifies the package family without the slash quirks of
  # hierarchical GHCR paths.
  IMAGE_PREFIX: ghcr.io/wellmade-studio

jobs:
  build-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push core
        uses: docker/build-push-action@v7
        with:
          context: images/core
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/dc-core:v1
            ${{ env.IMAGE_PREFIX }}/dc-core:latest
          # Cache only on push events (where we're authenticated to the
          # registry). PRs build without cache for safety. `ignore-error`
          # on cache-from lets first-run builds proceed when the cache
          # image doesn't exist yet (GHCR returns 403 for missing public
          # packages, not 404 — without this flag, buildx aborts).
          cache-from: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}/dc-core:buildcache,ignore-error=true
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/dc-core:buildcache,mode=max', env.IMAGE_PREFIX) || '' }}

  build-workbench:
    runs-on: ubuntu-latest
    needs: build-core
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push workbench
        uses: docker/build-push-action@v7
        with:
          context: images/workbench
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CORE_TAG=v1
          tags: |
            ${{ env.IMAGE_PREFIX }}/dc-workbench:v1
            ${{ env.IMAGE_PREFIX }}/dc-workbench:latest
          cache-from: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}/dc-workbench:buildcache,ignore-error=true
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/dc-workbench:buildcache,mode=max', env.IMAGE_PREFIX) || '' }}
