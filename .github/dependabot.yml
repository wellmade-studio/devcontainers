version: 2
updates:
  # Base image digests + any FROM lines in Dockerfiles.
  - package-ecosystem: docker
    directory: /images/core
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: docker
    directory: /images/workbench
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used in the build workflow.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
