# Wellmade prompt config — used by dc-core (and dc-workbench by inheritance).
#
# Design (locked in docs/future-plan.md item 13b, 2026-05-29):
#
#   [dc] metabooks git:(develop)                                        $
#                                                                       └ green/red on success/failure
#
#   With git ahead/behind/dirty when relevant:
#     [dc] metabooks git:(develop ↑2 ↓1 ✗) $
#
#   With command duration > 1s on the right edge (RPROMPT):
#     [dc] metabooks git:(develop) $                                   1.2s
#     [dc] metabooks git:(develop) $                                  12.4s  ← yellow above 10s
#
# `[dc]` only appears when WELLMADE_DC=1 is set in the environment.
# That env var is set by dc-core's Dockerfile but never on a host shell,
# so the same config gives an indicator-free prompt outside the
# container. Drop this file into ~/.config/starship.toml on the host
# to get the same look there.

# Keep the prompt rendering fast and predictable. No async modules,
# no Node/Python/Rust/k8s detection — they're noise in a workbench
# image where every container has all the toolchains.

# Use a single line; the conventional `<info> $` shape (info first,
# then the typing-symbol) rather than a leading arrow.
format = """
$custom\
$directory\
$git_branch\
$git_status\
$character"""

# Command duration goes on the right, RPROMPT-style. starship hides
# RPROMPT automatically when the command line gets too long, so it
# never gets in the way of typing.
right_format = """$cmd_duration"""

# Disable the default newline-before-prompt so we keep robbyrussell's
# tight one-line shape. (rr doesn't print a blank line between
# prompts; starship does by default.)
add_newline = false


# --- [dc] indicator -------------------------------------------------------
# Renders only when the WELLMADE_DC env var is set (i.e. inside one of
# our dev container images). Color 141 = light lavender, picked because
# it sits outside rr's green/cyan/yellow/red palette.
[custom.dc]
description = "Wellmade dev container indicator"
when = '''test -n "$WELLMADE_DC"'''
command = 'echo "[dc]"'
format = "[$output]($style) "
style = "fg:141"
# Just `sh` — starship runs custom-module scripts non-interactively
# already, so no profile-suppression flags are needed. The old
# `--noprofile --norc` are bash-only; on images where /bin/sh is dash
# they abort with "Illegal option --", silently failing the `when` test
# so [dc] never rendered even with WELLMADE_DC set.
shell = ["sh"]


# --- directory ------------------------------------------------------------
# Just the leaf segment of cwd (matches rr's behavior). Cyan, no
# truncation indicator clutter.
[directory]
truncation_length = 1
truncate_to_repo = false
style = "cyan"
format = "[$path]($style)"


# --- git branch -----------------------------------------------------------
# rr-style: `git:(` and `)` in cyan, branch name in bright red.
# starship lets us bake the parens into the module format string.
[git_branch]
symbol = ""
format = "[ git:\\(](cyan)[$branch](bright-red)"
truncation_length = 24


# --- git status -----------------------------------------------------------
# Inside the closing `)`, append (in this order, only when non-zero):
#   - ↑N for ahead-of-upstream, in green ("ready to push")
#   - ↓N for behind-upstream, in yellow ("you should pull")
#   - ✗ for dirty working tree (unstaged + staged + untracked), in yellow
#
# starship combines all of these into one `git_status` module, but we
# want different colors per indicator, so each sub-indicator is its own
# styled token below.
#
# git_status only exposes two top-level vars: $all_status (expands the
# modified/staged/untracked/conflicted keys) and $ahead_behind (expands
# ahead/behind/diverged). $modified is NOT a top-level format var, so
# referencing it directly renders nothing. We compose from the two real
# vars and bake the leading space into each per-indicator string, so the
# gap before the `)` only appears when an indicator is actually present:
#   clean → git:(main)   dirty → git:(main ✗)
[git_status]
format = "[$all_status$ahead_behind](none)[\\)](cyan)"

# Per-indicator format strings. Empty when count is zero, otherwise a
# leading space + symbol + count in the right color.
ahead = "[ ↑$count](green)"
behind = "[ ↓$count](yellow)"
diverged = "[ ↑$ahead_count](green)[ ↓$behind_count](yellow)"
modified = "[ ✗](yellow)"
staged = "[ ✗](yellow)"
untracked = "[ ✗](yellow)"
conflicted = "[ !](red)"
renamed = ""
deleted = ""
stashed = ""


# --- prompt character (the trailing `$`) ---------------------------------
# Green when last command succeeded, red on non-zero exit.
# (Same semantics as rr's arrow colour.)
[character]
success_symbol = "[ \\$](green)"
error_symbol = "[ \\$](red)"


# --- command duration -----------------------------------------------------
# Right-aligned via right_format. Only renders when the previous
# command took more than 1 second. Yellow above 10s to draw the eye.
[cmd_duration]
min_time = 1000
show_milliseconds = false
format = "[$duration]($style)"
style = "bright-black"

# (starship doesn't natively let us pick a different color above a
# threshold within cmd_duration. The "yellow above 10s" rule from
# the locked design is approximated here by keeping the default
# bright-black — it stays subtle, the eye still notices a
# >10s duration just by reading the number. If you want the
# explicit yellow threshold, the cleanest way is a custom module
# that re-reads the duration. Worth doing if the visual cue
# actually matters; defer until I see I'm missing it in practice.)


# --- modules turned off ---------------------------------------------------
# Anything not listed in `format` above won't render. starship still
# evaluates the rest by default (lightweight, but adds startup cost).
# Explicit disables for the ones that would otherwise auto-detect.

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[kubernetes]
disabled = true

[time]
disabled = true

[hostname]
disabled = true

[username]
disabled = true

[shell]
disabled = true
